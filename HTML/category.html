<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WORD GAME</title>
        <link rel="stylesheet" href="../CSS/category.css">        
        <link rel="stylesheet" href="../CSS/headerSec.css">        
        <link rel="icon" href="../assets/wordGameIcon.png">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    </head>
    <body>
        
        <div class="headerSec">
            <div class="player1HPbar">
                <div class="nameAndHP">
                    <p class="player1"></p>
                    <p class="hp">100</p>
                </div>
                <div class="player1Overlay"></div>
            </div>
            <div class="vsText">
                <div class="cupIcon"></div>
                <p>VS</p>
            </div>
            <div class="player2HPbar">
                <div class="nameAndHP">
                    <p class="player2"></p>
                    <p class="hp2">100</p>
                </div>
                <div class="player2Overlay"></div>
            </div>
        </div>

        <div class="mainSec">
            <div class="card">
                <h1 class="cardTitle">SELECT A CATEGORY</h1>
                <div class="categories">
                    <div class="category category1">ANIMALS</div>
                    <div class="category category2">PLANTS</div>
                    <div class="category category3">COLORS</div>
                    <div class="category category4">COUNTRIES</div>
                    <div class="category category5">REGIONS</div>
                    <div class="category category6">VILLAGES</div>
                    <div class="category category7">NAMES</div>
                    <div class="category category8">FRUITS</div>
                    <div class="category category9">VEGETABLES</div>
                    <div class="category category10">SPORTS</div>
                    <div class="category category11">VEHICLES</div>
                    <div class="category category12">INSTRUMENTS</div>
                    <div class="category category13">LANGUAGES</div>
                    <div class="category category14">FILMS</div>
                    <div class="category category15">BOOKS</div>
                    <div class="category category16">TOOLS</div>
                    <div class="category category17">ELECTRONICS</div>
                    <div class="category category18">OTHERS</div>
                </div>
                <input type="text" class="customCategory" placeholder="Type your custom category...">
                <div class="btn">CONFIRM CATEGORY</div>
            </div>
        </div>

        <script src="../JavaScript/nameShowUp.js"></script>
        <script src="../JavaScript/category.js"></script>
    </body>
</html>
