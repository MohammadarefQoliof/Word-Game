<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WORD GAME</title>
        <link rel="stylesheet" href="../CSS/playing.css">
        <link rel="stylesheet" href="../CSS/extraCSS/headerSec.css">  
        <link rel="icon" href="../assets/wordGameIcon.png">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    </head>
    <body>
        
        <div class="headerSec">
            <div class="player1HPbar">
                <div class="nameAndHP">
                    <p class="player1"></p>
                    <div class="heartHp">
                        <div class="heartBlue"></div>
                        <p class="hp">100</p>
                    </div>
                </div>
                <div class="player1Overlay"></div>
            </div>
            <div class="vsText">
                <div class="cupIcon"></div>
                <p>VS</p>
            </div>
            <div class="player2HPbar">
                <div class="nameAndHP">
                    <p class="player2"></p>
                    <div class="heartHp">
                        <div class="pinkHeart"></div>
                        <p class="hp2">100</p>
                    </div>
                </div>
                <div class="player2Overlay"></div>
            </div>
        </div>
        <div class="mainSec">
            <div class="quizWordCard">
                <div class="category"></div>
                <div class="questionIcon"></div>
                <div class="guessSec">
                    <div class="freeGuesses"></div>
                    <div class="guessesLeft"></div>
                </div>
            </div>
            <div class="guessingSec">
                <div class="letterGuess">
                    <div class="letterTopic topic">GUESS A LETTER</div>
                    <div class="inputAndBtn">
                        <input type="text" placeholder="A" maxlength="1" class="letterInput">
                        <div class="btn">GUESS</div>
                    </div>
                </div>
                <div class="wordGuess">
                    <div class="topics">
                        <div class="wordTopic topic">GUESS THE WORD</div>
                        <div class="onlyChance">1 CHANCE!</div>
                    </div>
                    <div class="inputAndBtn">
                        <input type="text" placeholder="Full Word..." maxlength="12" class="wordInput">
                        <div class="btn wordBtn">SOLVE</div>
                    </div>
                </div>
            </div>
        </div>

        <script src="../JavaScript/extraJS/nameShowUp.js"></script>
        <script src="../JavaScript/extraJS/noCheating.js"></script>
        <script src="../JavaScript/playing.js"></script>
    </body>
</html>
