<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WORD GAME</title>
        <link rel="stylesheet" href="../CSS/startingPage.css">
        <link rel="stylesheet" href="../CSS/extraCSS/headerSec.css">
        <link rel="icon" href="../assets/wordGameIcon.png">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="headerSec">
            <div class="player1HPbar">
                <div class="nameAndHP">
                    <p class="player1"></p>
                    <div class="heartHp">
                        <div class="heartBlue"></div>
                        <p class="hp"></p>
                    </div>
                </div>
                <div class="player1Overlay"></div>
            </div>
            <div class="vsText">
                <div class="cupIcon"></div>
                <p>VS</p>
            </div>
            <div class="player2HPbar">
                <div class="nameAndHP">
                    <p class="player2"></p>
                    <div class="heartHp">
                        <div class="pinkHeart"></div>
                        <p class="hp2"></p>
                    </div>
                </div>
                <div class="player2Overlay"></div>
            </div>
        </div>
        <div class="mainSec">
            <div class="card">
                <h1 class="cardTitle">NEW ROUND</h1>
                <div class="wordWriter">
                    <p class="wordWriterText">WORD WRITER</p>
                    <p class="playerName"></p>
                </div>
                <div class="arrow"></div>
                <div class="wordFinder">
                    <p class="wordWriterText">WORD FINDER</p>
                    <p class="playerName2"></p>
                </div>
                <div class="paragraph">Pass the device to <span class="playerNameSpan"></span> to choose a category</div>
                <div class="btn">I AM <span class="btnPlayerName"></span>, LET'S GO</div>
            </div>
        </div>

        <script src="../JavaScript/extraJS/nameShowUp.js"></script>
        <script src="../JavaScript/extraJS/functions.js"></script>
        <script src="../JavaScript/startingPage.js"></script>
        <script src="../JavaScript/extraJS/noCheating.js"></script>
    </body>
</html>
