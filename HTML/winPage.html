<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WORD GAME</title>
        <link rel="stylesheet" href="../CSS/winPage.css">
        <link rel="stylesheet" href="../CSS/extraCSS/headerSec.css">
        <link rel="icon" href="../assets/wordGameIcon.png">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    </head>
    <body>
        
        <div class="headerSec">
            <div class="player1HPbar">
                <div class="nameAndHP">
                    <p class="player1"></p>
                    <div class="heartHp">
                        <div class="heartBlue"></div>
                        <p class="hp">100</p>
                    </div>
                </div>
                <div class="player1Overlay"></div>
            </div>
            <div class="vsText">
                <div class="cupIcon"></div>
                <p>VS</p>
            </div>
            <div class="player2HPbar">
                <div class="nameAndHP">
                    <p class="player2"></p>
                    <div class="heartHp">
                        <div class="pinkHeart"></div>
                        <p class="hp2">100</p>
                    </div>
                </div>
                <div class="player2Overlay"></div>
            </div>
        </div>
        <div class="mainSec">
            <div class="card">
                <div class="crownBg">
                    <div class="crownIcon"></div>
                </div>
                <div class="gameOver">GAME OVER</div>
                <div class="winner"></div>
                <div class="hpShows">
                    <div class="hpBar1">
                        <div class="name1"></div>
                        <div class="realHp1">2 HP</div>
                    </div>
                    <div class="line">
                        -
                    </div>
                    <div class="hpBar2">
                        <div class="name2"></div>
                        <div class="realHp2">2 HP</div>
                    </div>
                </div>
                <div class="btn"><div class="starIcon"></div>PLAY AGAIN</div>
            </div>
        </div>
        <script src="../JavaScript/extraJS/nameShowUp.js"></script>
        <script src="../JavaScript/winPage.js"></script>
        <script src="../JavaScript/extraJS/noCheating.js"></script>
    </body>
</html>
